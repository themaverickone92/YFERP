<svg width="1920" height="800" viewBox="0 0 1920 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="warehouseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="windowPattern" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="transparent"/>
      <rect x="8" y="8" width="24" height="24" fill="#fbbf24" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Sky Background -->
  <rect width="1920" height="800" fill="url(#skyGradient)"/>
  
  <!-- City Skyline -->
  <!-- Building 1 -->
  <rect x="0" y="400" width="150" height="400" fill="url(#buildingGradient)"/>
  <rect x="0" y="400" width="150" height="400" fill="url(#windowPattern)"/>
  
  <!-- Building 2 -->
  <rect x="150" y="350" width="120" height="450" fill="url(#buildingGradient)"/>
  <rect x="150" y="350" width="120" height="450" fill="url(#windowPattern)"/>
  
  <!-- Building 3 -->
  <rect x="270" y="300" width="180" height="500" fill="url(#buildingGradient)"/>
  <rect x="270" y="300" width="180" height="500" fill="url(#windowPattern)"/>
  
  <!-- Warehouse Complex -->
  <rect x="500" y="450" width="400" height="350" fill="url(#warehouseGradient)"/>
  <polygon points="500,450 700,350 900,450" fill="#6b7280"/>
  
  <!-- Warehouse doors -->
  <rect x="520" y="650" width="60" height="150" fill="#374151"/>
  <rect x="600" y="650" width="60" height="150" fill="#374151"/>
  <rect x="680" y="650" width="60" height="150" fill="#374151"/>
  <rect x="760" y="650" width="60" height="150" fill="#374151"/>
  <rect x="840" y="650" width="60" height="150" fill="#374151"/>
  
  <!-- Building 4 -->
  <rect x="950" y="380" width="140" height="420" fill="url(#buildingGradient)"/>
  <rect x="950" y="380" width="140" height="420" fill="url(#windowPattern)"/>
  
  <!-- Building 5 -->
  <rect x="1100" y="320" width="160" height="480" fill="url(#buildingGradient)"/>
  <rect x="1100" y="320" width="160" height="480" fill="url(#windowPattern)"/>
  
  <!-- Building 6 -->
  <rect x="1270" y="410" width="130" height="390" fill="url(#buildingGradient)"/>
  <rect x="1270" y="410" width="130" height="390" fill="url(#windowPattern)"/>
  
  <!-- Building 7 -->
  <rect x="1410" y="360" width="170" height="440" fill="url(#buildingGradient)"/>
  <rect x="1410" y="360" width="170" height="440" fill="url(#windowPattern)"/>
  
  <!-- Building 8 -->
  <rect x="1590" y="420" width="120" height="380" fill="url(#buildingGradient)"/>
  <rect x="1590" y="420" width="120" height="380" fill="url(#windowPattern)"/>
  
  <!-- Building 9 -->
  <rect x="1720" y="390" width="200" height="410" fill="url(#buildingGradient)"/>
  <rect x="1720" y="390" width="200" height="410" fill="url(#windowPattern)"/>
  
  <!-- Delivery Trucks -->
  <g id="truck1" transform="translate(600, 720)">
    <rect x="0" y="10" width="80" height="30" fill="#dc2626"/>
    <rect x="80" y="5" width="40" height="35" fill="#dc2626"/>
    <circle cx="15" cy="50" r="8" fill="#1f2937"/>
    <circle cx="105" cy="50" r="8" fill="#1f2937"/>
    <rect x="85" y="15" width="30" height="20" fill="#60a5fa" opacity="0.6"/>
  </g>
  
  <g id="truck2" transform="translate(750, 720)">
    <rect x="0" y="10" width="80" height="30" fill="#7c3aed"/>
    <rect x="80" y="5" width="40" height="35" fill="#7c3aed"/>
    <circle cx="15" cy="50" r="8" fill="#1f2937"/>
    <circle cx="105" cy="50" r="8" fill="#1f2937"/>
    <rect x="85" y="15" width="30" height="20" fill="#60a5fa" opacity="0.6"/>
  </g>
  
  <!-- Digital Elements -->
  <!-- Connection Lines -->
  <g opacity="0.4">
    <line x1="700" y1="200" x2="900" y2="150" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="900" y1="150" x2="1200" y2="180" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="1200" y1="180" x2="1500" y2="120" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Data Nodes -->
  <circle cx="700" cy="200" r="6" fill="#fbbf24">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="150" r="6" fill="#fbbf24">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="180" r="6" fill="#fbbf24">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1500" cy="120" r="6" fill="#fbbf24">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.3">
    <ellipse cx="300" cy="100" rx="60" ry="30" fill="white"/>
    <ellipse cx="320" cy="90" rx="40" ry="25" fill="white"/>
    <ellipse cx="280" cy="90" rx="35" ry="20" fill="white"/>
    
    <ellipse cx="800" cy="80" rx="80" ry="35" fill="white"/>
    <ellipse cx="830" cy="70" rx="50" ry="30" fill="white"/>
    <ellipse cx="770" cy="70" rx="45" ry="25" fill="white"/>
    
    <ellipse cx="1400" cy="90" rx="70" ry="32" fill="white"/>
    <ellipse cx="1430" cy="80" rx="45" ry="28" fill="white"/>
    <ellipse cx="1370" cy="80" rx="40" ry="22" fill="white"/>
  </g>
  
  <!-- Overlay gradient for text readability -->
  <rect width="1920" height="800" fill="url(#skyGradient)" opacity="0.7"/>
</svg>